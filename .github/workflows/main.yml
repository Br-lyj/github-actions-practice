# 名稱
name: Call API Daily

# 觸發條件
on:
  schedule:
    # 每天下午 5 點整 (UTC+8)+9 抓取一次
    - cron: '*/1 * * * *'
  workflow_dispatch:  # 允許手動觸發

# 執行工作
jobs:
  build:
    # 使用 Ubuntu 最新版
    runs-on: ubuntu-latest

    steps:
      # 步驟 1：下載 GitHub repository 的內容
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      # 步驟 2：呼叫 API 檔案存到 data.json
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 步驟 3：下載 requests
      - name: Install requests
        run: pip install requests

      # 步驟 4：執行 Python
      - name: Run Python script
        run: python app.py

      # 步驟 5：更新資料
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/*
          git commit -m "Add new API data"
          git push
